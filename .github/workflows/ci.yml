name: Test CI Pipeline

on:
  push:
    branches: 
      - master
  
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    # env:
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.jobs
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run List
        run: npm run lint

      - name: Run build
        run: npm run build
