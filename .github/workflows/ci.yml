name: Test CI Pipeline

on:
  push:
    branches: 
      - master
  
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.jobs
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Dependencies
        run: npm Install
      
      - name: Run List
        run: npm run lint

      - name: Run build
        run: npm run build
